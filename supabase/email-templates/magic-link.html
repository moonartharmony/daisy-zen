<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Daisy Zen — Sihirli Bağlantı</title>
  <style>
    /* Reset */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background-color: #0B0C10;
      font-family: -apple-system, 'Segoe UI', sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    a { text-decoration: none; color: inherit; }

    /* Container */
    .wrap {
      max-width: 480px;
      margin: 0 auto;
      padding: 48px 24px;
    }

    /* Daisy SVG badge */
    .daisy-badge {
      display: block;
      margin: 0 auto 32px;
      opacity: 0.92;
    }

    /* Body text */
    .body-text {
      text-align: center;
      font-size: 16px;
      line-height: 1.75;
      color: rgba(237, 233, 224, 0.75);
      margin-bottom: 36px;
    }

    /* CTA button */
    .cta-wrap {
      text-align: center;
      margin-bottom: 40px;
    }
    .cta {
      display: inline-block;
      padding: 14px 36px;
      font-size: 15px;
      font-weight: 700;
      color: #705E00;
      /* Gold gradient */
      background: linear-gradient(160deg, #FFE566 0%, #FFD700 50%, #FFC200 100%);
      border-radius: 14px;
      /* Transparent border with gold glow — via outline trick */
      outline: 1.5px solid rgba(255, 215, 0, 0.4);
      outline-offset: 3px;
      /* Glow */
      box-shadow:
        0 0 32px rgba(255, 215, 0, 0.35),
        inset 0 1px 0 rgba(255, 255, 255, 0.4);
      letter-spacing: 0.01em;
    }

    /* Divider */
    .divider {
      width: 40px;
      height: 1px;
      background: rgba(255,255,255,0.08);
      margin: 0 auto 28px;
    }

    /* Footer */
    .footer {
      text-align: center;
      font-size: 11px;
      color: rgba(255, 255, 255, 0.22);
      line-height: 1.7;
    }
  </style>
</head>
<body>
  <div class="wrap">

    <!-- Thin-line daisy SVG emblem -->
    <svg class="daisy-badge"
      viewBox="0 0 80 80" width="72" height="72" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
          <feGaussianBlur stdDeviation="2.2" result="b"/>
          <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <linearGradient id="sg" x1="0" y1="1" x2="0" y2="0">
          <stop offset="0%"   stop-color="#FFD700" stop-opacity="0.5"/>
          <stop offset="100%" stop-color="#FFF2AA" stop-opacity="0.9"/>
        </linearGradient>
      </defs>
      <g filter="url(#glow)">
        <ellipse cx="40" cy="15" rx="4.5" ry="12" fill="none" stroke="url(#sg)" stroke-width="1.3" transform="rotate(0 40 40)"/>
        <ellipse cx="40" cy="15" rx="4.5" ry="12" fill="none" stroke="url(#sg)" stroke-width="1.3" transform="rotate(45 40 40)"/>
        <ellipse cx="40" cy="15" rx="4.5" ry="12" fill="none" stroke="url(#sg)" stroke-width="1.3" transform="rotate(90 40 40)"/>
        <ellipse cx="40" cy="15" rx="4.5" ry="12" fill="none" stroke="url(#sg)" stroke-width="1.3" transform="rotate(135 40 40)"/>
        <ellipse cx="40" cy="15" rx="4.5" ry="12" fill="none" stroke="url(#sg)" stroke-width="1.3" transform="rotate(180 40 40)"/>
        <ellipse cx="40" cy="15" rx="4.5" ry="12" fill="none" stroke="url(#sg)" stroke-width="1.3" transform="rotate(225 40 40)"/>
        <ellipse cx="40" cy="15" rx="4.5" ry="12" fill="none" stroke="url(#sg)" stroke-width="1.3" transform="rotate(270 40 40)"/>
        <ellipse cx="40" cy="15" rx="4.5" ry="12" fill="none" stroke="url(#sg)" stroke-width="1.3" transform="rotate(315 40 40)"/>
        <circle cx="40" cy="40" r="7" fill="#FFD700" opacity="0.85"/>
      </g>
    </svg>

    <!-- Body -->
    <p class="body-text">
      Daisy Zen'e geri dönmek ve evrenini uyandırmak için<br />
      aşağıdaki bağlantıya dokun.
    </p>

    <!-- CTA -->
    <div class="cta-wrap">
      <a href="{{ .ConfirmationURL }}" class="cta">
        Zihni Uyandır
      </a>
    </div>

    <div class="divider"></div>

    <!-- Footer -->
    <p class="footer">
      Bu çağrıyı sen başlatmadıysan sessizce yok sayabilirsin.<br />
      Bağlantı 24 saat geçerlidir.
    </p>

  </div>
</body>
</html>
