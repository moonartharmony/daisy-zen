<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#B2AC88"/>

  <!-- Daisy petals (8 rounded ovals) -->
  <g transform="translate(256,256)">
    <ellipse cx="0" cy="-110" rx="28" ry="52" fill="white" stroke="#4D4732" stroke-width="5"/>
    <ellipse cx="0" cy="-110" rx="28" ry="52" fill="white" stroke="#4D4732" stroke-width="5" transform="rotate(45)"/>
    <ellipse cx="0" cy="-110" rx="28" ry="52" fill="white" stroke="#4D4732" stroke-width="5" transform="rotate(90)"/>
    <ellipse cx="0" cy="-110" rx="28" ry="52" fill="white" stroke="#4D4732" stroke-width="5" transform="rotate(135)"/>
    <ellipse cx="0" cy="-110" rx="28" ry="52" fill="white" stroke="#4D4732" stroke-width="5" transform="rotate(180)"/>
    <ellipse cx="0" cy="-110" rx="28" ry="52" fill="white" stroke="#4D4732" stroke-width="5" transform="rotate(225)"/>
    <ellipse cx="0" cy="-110" rx="28" ry="52" fill="white" stroke="#4D4732" stroke-width="5" transform="rotate(270)"/>
    <ellipse cx="0" cy="-110" rx="28" ry="52" fill="white" stroke="#4D4732" stroke-width="5" transform="rotate(315)"/>

    <!-- Center circle -->
    <circle cx="0" cy="0" r="60" fill="#FFD700" stroke="#4D4732" stroke-width="5"/>

    <!-- Arrow pointing north -->
    <path d="M0,-32 L0,32 M0,-32 L-14,-14 M0,-32 L14,-14"
      stroke="#4D4732" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>
</svg>
